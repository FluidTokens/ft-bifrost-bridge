# binocular ("bitfrost") config for the compose bench: regtest bitcoind +
# yaci-devkit via binocular's native `yaci` backend (BlockfrostProvider.localYaci).
# Field names are pureconfig kebab-case over oracle/CardanoConfig.scala et al.
# The oracle/relay/bridge identifiers are produced by the deploy steps of
# scenario 1 and land here via env substitution (${?VAR}) — unset is fine
# until the command that needs them runs.
binocular {
  bitcoin-node {
    url = "http://bitcoind:18443"
    username = "bifrost"
    password = "bifrost"
    network = "regtest"
  }

  cardano {
    network = "testnet" # yaci devnet (magic 42)
    backend = "yaci"
    yaci-store-url = "http://yaci-devkit:8080/api/v1"
    yaci-admin-url = "http://yaci-devkit:10000/local-cluster/api"
  }

  wallet {
    mnemonic = ${?WALLET_MNEMONIC}
  }

  relay {
    # tmtx ids come from `tm-script` output when the TM relay scenarios land.
    tmtx-policy-id = ${?TMTX_POLICY_ID}
    tmtx-asset-name = "TMTx"
    poll-interval = 5
    retry-interval = 10
  }

  oracle {
    tx-out-ref = ${?ORACLE_TX_OUT_REF} # printed by `init`
    owner-pkh = ${?ORACLE_OWNER_PKH}
    challenge-aging = 60
    maturation-confirmations = 3 # regtest: blocks are free, keep small
    start-height = 0
    max-headers-per-tx = 40
    closure-timeout = 600
  }

  # Filled from `deploy-bridge` / `deploy-script-refs` output when the peg
  # scenarios land (see preprod-demo.conf in the binocular repo for the
  # full field set).
  bridge {
    config-nft-policy-id = ${?BRIDGE_CONFIG_NFT_POLICY_ID}
    config-nft-asset-name = "424946434647"
  }
}
