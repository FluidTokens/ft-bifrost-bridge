# Bifrost E2E test bench: bitcoind(regtest) + yaci-devkit + binocular
# watchtower ("bitfrost") + 4 heimdall SPOs. See README.md for the
# bitcoind-in-compose decision and version pinning.
name: bitfrost-test-scenarios

services:
  bitcoind:
    image: ${BITCOIND_IMAGE:-bitcoin/bitcoin:28.1}
    command:
      - -regtest=1
      - -server=1
      - -txindex=1
      - -fallbackfee=0.0001
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=${BITCOIN_RPC_USER:-bifrost}
      - -rpcpassword=${BITCOIN_RPC_PASS:-bifrost}
    ports:
      - "18443:18443"
    volumes:
      - ./data/bitcoind:/home/bitcoin/.bitcoin
    healthcheck:
      test:
        [
          "CMD",
          "bitcoin-cli",
          "-regtest",
          "-rpcuser=${BITCOIN_RPC_USER:-bifrost}",
          "-rpcpassword=${BITCOIN_RPC_PASS:-bifrost}",
          "getblockchaininfo",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  # yaci-devkit, exactly as its own docker distribution runs it (see
  # yaci-devkit scripts/docker-compose.yml): the container idles and the
  # devnet is created by exec-ing the CLI one-shot —
  #   docker compose exec -d yaci-devkit /app/yaci-cli.sh \
  #     create-node -o --block-time 1 --epoch-length 60 --start
  # (scripts/00-lib.sh::yaci_create_node does this). Short epochs collapse
  # the 2-epoch stake-activation delay to ~2 minutes. The blockfrost-
  # compatible store API (:8080) serves heimdall + binocular; the admin API
  # (:10000, /local-cluster/api) serves faucet topups. Devnet magic is 42.
  yaci-devkit:
    image: ${YACI_CLI_IMAGE:-bloxbean/yaci-cli:0.11.0-beta1}
    entrypoint: ["sleep", "infinity"]
    environment:
      yaci_store_enabled: "true"
      ogmios_enabled: "false"
      kupo_enabled: "false"
      node: node1
      yaci_cli_mode: native
      yaci_store_mode: native
    ports:
      - "3001:3001" # cardano-node n2n
      - "8080:8080" # yaci-store (blockfrost-compatible API)
      - "8090:8090" # tx submit API
      - "10000:10000" # local-cluster admin API (topup, utxos)
    volumes:
      - ./data/yaci:/clusters

  # The watchtower: binocular oracle + bridge deploy tooling. Scenario
  # scripts drive one-shot commands via `docker compose run --rm bitfrost
  # --config /etc/binocular.conf <cmd>`; the service default runs the
  # combined watchtower daemon (oracle sync + TM relay + TM confirm) once
  # scenario 1 has deployed + initialized everything.
  bitfrost:
    build:
      context: ${BINOCULAR_SRC:-../../../lantr/binocular}
      dockerfile: ${PWD}/docker/binocular.Dockerfile
    command: ["--config", "/etc/binocular.conf", "watchtower"]
    environment:
      WALLET_MNEMONIC: ${WALLET_MNEMONIC:-all all all all all all all all all all all all}
      ORACLE_TX_OUT_REF: ${ORACLE_TX_OUT_REF:-}
      ORACLE_OWNER_PKH: ${ORACLE_OWNER_PKH:-}
    depends_on:
      bitcoind:
        condition: service_healthy
      yaci-devkit:
        condition: service_started
    volumes:
      - ./config/binocular.conf:/etc/binocular.conf:ro
      - ./keys:/keys
      - ./data/bitfrost:/data
      - ../onchain/plutus.json:/contracts/plutus.json:ro

  # In registry mode heimdall finds itself by its bifrost key and listens on
  # the port from its REGISTERED URL (http://heimdall-spoN:1850N), so no
  # --index/--base-port. Configs are rendered by scripts/01-bootstrap-dkz.sh
  # from config/heimdall-spoN.toml into data/generated/ (registry ids filled
  # in), then these services are started with the demo command.
  heimdall-spo1: &heimdall
    build:
      context: ${HEIMDALL_SRC:-../../../lantr/heimdall}
      dockerfile: ${PWD}/docker/heimdall.Dockerfile
    command: ["demo", "--config", "/etc/heimdall/heimdall.toml", "--deterministic"]
    environment: &heimdall-env
      HEIMDALL_MNEMONIC: ${HEIMDALL_MNEMONIC:-test walk nut penalty hip pave soap entry language right filter choice}
    depends_on:
      bitcoind:
        condition: service_healthy
      yaci-devkit:
        condition: service_started
    volumes:
      - ./data/generated/heimdall-spo1.toml:/etc/heimdall/heimdall.toml:ro
      - ./keys:/keys
      - ./data/spo1:/state
      - ../onchain/plutus.json:/contracts/plutus.json:ro
    ports:
      - "18501:18501"

  heimdall-spo2:
    <<: *heimdall
    volumes:
      - ./data/generated/heimdall-spo2.toml:/etc/heimdall/heimdall.toml:ro
      - ./keys:/keys
      - ./data/spo2:/state
      - ../onchain/plutus.json:/contracts/plutus.json:ro
    ports:
      - "18502:18502"

  heimdall-spo3:
    <<: *heimdall
    volumes:
      - ./data/generated/heimdall-spo3.toml:/etc/heimdall/heimdall.toml:ro
      - ./keys:/keys
      - ./data/spo3:/state
      - ../onchain/plutus.json:/contracts/plutus.json:ro
    ports:
      - "18503:18503"

  heimdall-spo4:
    <<: *heimdall
    volumes:
      - ./data/generated/heimdall-spo4.toml:/etc/heimdall/heimdall.toml:ro
      - ./keys:/keys
      - ./data/spo4:/state
      - ../onchain/plutus.json:/contracts/plutus.json:ro
    ports:
      - "18504:18504"
