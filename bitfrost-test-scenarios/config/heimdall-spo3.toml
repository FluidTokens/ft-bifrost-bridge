# SPO 3 of 4 — bitfrost-test-scenarios compose bench (yaci devnet, regtest).
# TEMPLATE: scripts/01-bootstrap-dkz.sh renders it to
# data/generated/heimdall-spo3.toml, replacing the @...@ placeholders with
# the identifiers minted by the registry bootstrap. The compose services
# mount the RENDERED file. In registry mode heimdall finds itself by its
# bifrost key and listens on the port of its registered URL
# (http://heimdall-spo3:18503) — no --index.

[protocol]
# Compose-tuned DKG pacing. The window MUST exceed dkg_round2_offset by more
# than the ~2s retry backoff (self-healing inequality — see heimdall
# EpochConfig::dkg_window docs): 60 + 2 < 90.
dkg_round_timeout_secs = 60
dkg_window_secs = 90
dkg_join_wait_secs = 300
dkg_round1_offset_secs = 30
dkg_round2_offset_secs = 60
poll_interval_ms = 1000
quorum51_timeout_secs = 60
federation_timeout_secs = 60
leader_timeout_secs = 300
pegin_collection_window_secs = 5
pegin_poll_interval_ms = 1000
state_dir = "/state"

[bitcoin]
network = "regtest"
rpc_url = "http://bitcoind:18443"
rpc_user = "bifrost"
rpc_pass = "bifrost"
# Regtest: short depositor refund + federation CSV so scenario 3 mines past
# them in one call.
pegin_refund_timeout_blocks = 144
federation_csv_blocks = 144

[cardano]
# yaci-store, blockfrost-compatible. project_id is ignored by yaci-store but
# heimdall's URL routing only engages when it is non-empty.
blockfrost_url = "http://yaci-devkit:8080/api/v1/"
blockfrost_project_id = "devnet"
# Registry-driven roster (rendered by the bootstrap script).
registry_blueprint = "/contracts/plutus.json"
registry_bootstrap = "@REGISTRY_BOOTSTRAP@"
treasury_info_asset_name = "@TREASURY_INFO_ASSET_NAME@"
# Devnet pools carry small equal stake; pass R2 with any stake at all.
min_stake_lovelace = 1
demo_exclude_unstaked = true
# DKG + key publication only; no oracle post from the bench SPOs.
submit_oracle = false

[http]
bind_address = "0.0.0.0"

[bifrost]
# Generated by scripts/01-bootstrap-dkz.sh into the shared ./keys volume
# (gitignored). 0600, 32-byte hex secret key.
skey_path = "/keys/spo3-bifrost.skey"
