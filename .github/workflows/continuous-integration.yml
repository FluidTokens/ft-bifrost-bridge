name: Continuous Integration

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # The Aiken project root is onchain/, not the repo root — aiken.toml lives there.
        working-directory: onchain
    steps:
      - uses: actions/checkout@v4
      - uses: aiken-lang/setup-aiken@v1
        with:
          # Must match onchain/aiken.toml.
          version: v1.1.21
      - run: aiken check -D
      - run: aiken build
      # `aiken fmt --check` is intentionally not run. Under v1.1.21 it reformats four files on
      # pristine upstream main (bitcoin.ak, peg-in.ak, spo-bans.ak, spos-registry.ak, ~210 lines)
      # because the tree was formatted with an older aiken. Enabling it here would be red from day
      # one for reasons unrelated to any change under test. Adopting fmt needs a one-off tree-wide
      # reformat agreed with upstream; until then it is noise, not signal.
