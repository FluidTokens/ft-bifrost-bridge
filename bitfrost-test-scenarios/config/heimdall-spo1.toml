# SPO 1 of 4 — bitfrost-test-scenarios compose bench (yaci devnet, regtest).
# TEMPLATE: scripts/01-bootstrap-dkz.sh renders it to
# data/generated/heimdall-spo1.toml, replacing the @...@ placeholders with
# the identifiers minted by the registry bootstrap. The compose services
# mount the RENDERED file. In registry mode heimdall finds itself by its
# bifrost key and listens on the port of its registered URL
# (http://heimdall-spo1:18501) — no --index.

[protocol]
# Compose-tuned DKG pacing. TWO invariants, and the second was violated until
# 2026-07-22:
#
#  (1) the window MUST exceed dkg_round2_offset by more than the ~2s retry
#      backoff (self-healing inequality — see heimdall EpochConfig::dkg_window
#      docs): 60 + 2 < 90.
#
#  (2) a whole ceremony MUST fit inside ONE devnet epoch, and the window MUST
#      NOT exceed it. The candidate set, the ban filter and the schedule anchor
#      (schedule_anchor_ms = epoch_start_ms) are all epoch-scoped, so a ceremony
#      that outlives its epoch is anchored to a boundary the chain has already
#      left behind — and nodes that re-enter after an abort capture DIFFERENT
#      epochs, whose namespaces then reject each other's payloads.
#      Previously: epoch 60s, window 90s, join wait 300s — a ceremony spanned
#      FIVE epochs and the window was longer than the epoch containing it.
#      Now: DEVNET_EPOCH_SLOTS=180 (00-lib.sh), window 45 -> FOUR windows per
#      epoch, dividing it evenly so no window straddles a boundary. That makes
#      in-epoch retry the normal recovery: a later window reuses the SAME
#      boundary-locked candidate set, identifiers and t, advancing only
#      `attempt`. Crossing a boundary is then the only event that renumbers.
#      check_dkg_pacing() in 00-lib.sh enforces both invariants.
dkg_round_timeout_secs = 60
dkg_window_secs = 45
dkg_join_wait_secs = 30
dkg_round1_offset_secs = 15
dkg_round2_offset_secs = 30
poll_interval_ms = 1000
quorum51_timeout_secs = 60
leader_timeout_secs = 300
pegin_collection_window_secs = 5
pegin_poll_interval_ms = 1000
state_dir = "/state"

[bitcoin]
network = "regtest"
rpc_url = "http://bitcoind:18443"
rpc_user = "bifrost"
rpc_pass = "bifrost"
# Regtest: short depositor refund + federation CSV so scenario 3 mines past
# them in one call.
pegin_refund_timeout_blocks = 144
federation_csv_blocks = 144

[cardano]
# yaci-store, blockfrost-compatible. project_id is ignored by yaci-store but
# heimdall's URL routing only engages when it is non-empty.
blockfrost_url = "http://yaci-devkit:8080/api/v1/"
blockfrost_project_id = "devnet"
# yaci-store has no blockfrost /pools/{id}; heimdall's yaci_store stake
# source reads /epochs/{epoch}/pools/{id}/stake instead.
stake_source = "yaci_store"
# Registry-driven roster (rendered by the bootstrap script).
registry_blueprint = "/contracts/plutus.json"
registry_bootstrap = "@REGISTRY_BOOTSTRAP@"
treasury_info_asset_name = "@TREASURY_INFO_ASSET_NAME@"
# Devnet pools carry small equal stake; pass R2 with any stake at all.
min_stake_lovelace = 1
demo_exclude_unstaked = true
# DKG + key publication only; no oracle post from the bench SPOs.
submit_oracle = false

# ── DKG fault proofs + SPO bans (scenario 2) ─────────────────────────────
# The three fault policy ids are pure functions of the blueprint + registry
# bootstrap, so 01-bootstrap-dkz.sh learns them from a WALLET-FREE
# `deploy-fault-ref` dry run and renders them here before minting the
# ban-list root — `bootstrap-ban-list` reads them back out of this file
# (BanPolicyParams::from_config), which is why they cannot wait for the
# deploy txs. Order is fixed at deploy time: round1, round2, equivocation.
ban_bootstrap = "@BAN_BOOTSTRAP@"
fault_proof_policies = [
  "@FAULT_POLICY_ROUND1@",
  "@FAULT_POLICY_ROUND2@",
  "@FAULT_POLICY_EQUIVOCATION@",
]
# Ban schedule — MUST match the args deploy-spo-bans-ref was parameterized
# with, or the recomputed spo_bans hash misses the deployed ref. Both sides
# are rendered from BAN_* in scripts/00-lib.sh.
base_ban_duration_ms = @BAN_BASE_DURATION_MS@
max_faults_before_permanent = @BAN_MAX_FAULTS_BEFORE_PERMANENT@
max_validity_window_ms = @BAN_MAX_VALIDITY_WINDOW_MS@
# CIP-33 reference scripts, deployed by 01-bootstrap-dkz.sh step 6b.
spo_bans_ref = "@SPO_BANS_REF@"
fault_verifier_round1_ref = "@FAULT_REF_ROUND1@"
fault_verifier_round2_ref = "@FAULT_REF_ROUND2@"
fault_verifier_equivocation_ref = "@FAULT_REF_EQUIVOCATION@"
# Deliberately absent from the image. The equivocation path is ZK-free — no
# SRS is ever opened and the round1/round2 verifier refs are never consumed —
# but from_config requires the key. A real Round-1/Round-2 proof would fail
# loudly here rather than silently reading a bogus SRS.
fault_proof_srs_path = "/contracts/fault-proof-srs.bin"

[http]
bind_address = "0.0.0.0"

[bifrost]
# Generated by scripts/01-bootstrap-dkz.sh into the shared ./keys volume
# (gitignored). 0600, 32-byte hex secret key.
skey_path = "/keys/spo1-bifrost.skey"
